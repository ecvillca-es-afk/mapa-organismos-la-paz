        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }

function contarPorCategoria(lista) {
    var conteo = {};
    lista.forEach(function(layer) {
        var cat = layer.feature.properties['categoria'] || 'Sin categoría';
        conteo[cat] = (conteo[cat] || 0) + 1;
    });
    return conteo;
}

function renderContadores(lista) {
    var conteo = contarPorCategoria(lista);
    var html = '<strong>Total: ' + lista.length + ' organismos</strong><br>';
    Object.keys(conteo).sort().forEach(function(cat) {
        html += '• ' + cat + ': <strong>' + conteo[cat] + '</strong><br>';
    });
    document.getElementById('contadores').innerHTML = html;
}

function renderLista(lista) {
    var html = '';
    lista.forEach(function(layer, idx) {
        var p = layer.feature.properties;
        html += '<div class="item-org" data-idx="' + idx + '">'
              + '<strong>' + (p['sigla'] || '') + ' — ' + (p['nombre_oficial'] || '') + '</strong>'
              + '<span>' + (p['categoria'] || '') + '</span>'
              + '</div>';
    });
    document.getElementById('lista').innerHTML = html;

    document.querySelectorAll('.item-org').forEach(function(el) {
        el.addEventListener('click', function() {
            var layer = lista[parseInt(this.getAttribute('data-idx'))];
            var ll = layer.getLatLng();
            map.setView(ll, 17);
            layer.openPopup();
        });
    });
}

function actualizarPanel(filtroTexto, filtroCategoria) {
    filtroTexto = filtroTexto || '';
    filtroCategoria = filtroCategoria || '';
    var filtrados = todosLosOrganismos.filter(function(layer) {
        var p = layer.feature.properties;
        var texto = ((p['nombre_oficial'] || '') + ' ' + (p['sigla'] || '')).toLowerCase();
        var coincideTexto = texto.includes(filtroTexto.toLowerCase());
        var coincideCategoria = filtroCategoria === '' || (p['categoria'] || '') === filtroCategoria;
        return coincideTexto && coincideCategoria;
    });

    // Mostrar u ocultar marcadores en el mapa
    todosLosOrganismos.forEach(function(layer) {
        var p = layer.feature.properties;
        var texto = ((p['nombre_oficial'] || '') + ' ' + (p['sigla'] || '')).toLowerCase();
        var coincideTexto = texto.includes(filtroTexto.toLowerCase());
        var coincideCategoria = filtroCategoria === '' || (p['categoria'] || '') === filtroCategoria;
        if (coincideTexto && coincideCategoria) {
            if (!map.hasLayer(layer)) map.addLayer(layer);
        } else {
            if (map.hasLayer(layer)) map.removeLayer(layer);
        }
    });

    renderContadores(filtrados);
    renderLista(filtrados);
}

document.getElementById('buscador').addEventListener('input', function() {
    var cat = document.getElementById('filtro-categoria').value;
    actualizarPanel(this.value, cat);
});

document.getElementById('filtro-categoria').addEventListener('change', function() {
    var texto = document.getElementById('buscador').value;
    actualizarPanel(texto, this.value);
});

setTimeout(function() {
    todosLosOrganismos = [];

        todosLosOrganismos.push(layer);
    });
    actualizarPanel('');
}, 300);
